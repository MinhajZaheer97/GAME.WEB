<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME.WEB</title>
    <link rel="stylesheet" href="r-p-s.css">
    <script src="r-p-s.js" defer></script>
</head>
<body>
    <h1 class="game">Rock Paper Scissors</h1>
    <h2 class="winner"></h2>

    <div class="image-container">
        <div class="players player1">
            <span class="imoji rock">✊</span>
            <span class="imoji paper">✋</span>
            <span class="imoji scissor">✌️</span>
        </div>
        <div class="players player2">
            <span class="imoji rock">✊</span>
            <span class="imoji paper">✋</span>
            <span class="imoji scissor">✌️</span>
        </div>
    </div>
    <div class="btn-container">
        <div class="player1 moves">
            <button class = "player1Turn btn player">Player1 moves</button>
            <div class="options-container options-container1">
                <button class="btn option optionPlayer1">Rock ✊</button>
                <button class="btn option optionPlayer1">Paper ✋</button>
                <button class="btn option optionPlayer1">scissor ✌️</button>
            </div>
        </div>
        <div class="player2 moves">
            <button class = "player2Turn btn player">Player2 moves</button>
            <div class="options-container options-container2">
                <button class="btn option optionPlayer2">Rock ✊</button>
                <button class="btn option optionPlayer2">Paper ✋</button>
                <button class="btn option optionPlayer2">scissor ✌️</button>
            </div>
        </div>
    </div>
    <div class="fightbtn-container">
        <button class = "fight btn"> FIGHT</button>
    </div>
    <div class="newBtn-container">
        <button class="newGame btn">NEW GAME</button>
    </div>
</body>
</html>
