<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAME.WEB</title>
    <link rel="stylesheet" href="../componenets/navbar.css" />
    <link rel="stylesheet" href="startpage.css" />
    <script src="startpage.js" defer></script>
  </head>
  <body>
    <nav class="navbar">
      <span class="profile-con" id="profileToggle" role="button" tabindex="0" aria-label="Open profile info">
        <img
          src="../assets/images/def-profile.png"
          alt="view profile"
          class="logo"
        />
      </span>
      <span class="setting-con">
        <button class = "logout btn">Logout</button>
        </span>
    </nav>

    <div class="profile-info">
      <button class="close-profile" aria-label="Close profile">×</button>
      <span>
          <p class="username">user-name</p><button class="change-user">change username</button>
      </span>
      <span>
          <p class="password">password</p><button class="change-pass">change password</button>
      </span>
      <span>
        <p class = "avatar">select avatar</p>
            <div class="avatar-con">
                <img src="../assets/images/avatar-1.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-2.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-3.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-4.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-5.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-6.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-7.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-8.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-9.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-10.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-11.jpg" alt="avatar" class="avatar-img">
                <img src="../assets/images/avatar-12.jpg" alt="avatar" class="avatar-img">
            </div>
      </span>
    </div>
    <h1 class="welcome glow-pulse">WELCOME TO GAME.WEB</h1>
    <button class="start btn">PLAY</button>
    <button class="start btn about">ABOUT</button>
  </body>
</html>
