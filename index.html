<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME.WEB</title>
    <link rel="stylesheet" href="/login-page/login.css">
    <script src="/login-page/login.js" defer></script>
</head>

<body>
    <h1 class="welcome glow-pulse">WELCOME TO GAME.WEB</h1>

    <h3>Sign up or login</h3>

    <div>
        <p>user-name</p>
        <input type="text" placeholder="enter user-name" class="field name">
        <div class="name-con conditions">
            <p>
                user name should contain: 
            </p>
                <ul>
                    <li class="N1">Minimum 8 digits</li>
                    <li class="N2">No special character</li>
                </ul>
        </div>
        <p>password</p>
        <input type="password" placeholder="enter password" class="field pass"><br>
        <div class="pass-con conditions">
            <p>
                password should contain: 
            </p>
                <ul>
                    <li class="P1">minimum 8 digits</li>
                    <li class="P2">atleast one special character</li>
                    <li class="P3">should contain alphabets</li>
                </ul>
        </div>
        <button class="btn sign-up">sign up</button>
        <!-- <button class="btn login">login</button> -->
    </div>
</body>

</html>
